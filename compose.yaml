services:
  db:
    image: postgres:15-alpine
    restart: always
    user: postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.9.1
    volumes:
      - ./db/changelog:/liquibase/changelog
    command: >
      --changelog-file=changelog-master.yaml
      --url=jdbc:postgresql://db:5432/events_db
      --username=myuser
      --password=mypassword
      update
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: events-api
    depends_on:
      liquibase:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/events_db
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
      SPRING_DATASOURCE_DRIVER: org.postgressql.Driver
    ports:
      - "8080:8080"